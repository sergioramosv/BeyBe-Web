<!DOCTYPE html>
<html lang="es">
<head>
  <!-- =========================================================
       CONFIGURACIÓN BÁSICA DEL DOCUMENTO
       ========================================================= -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título de la página -->
  <title>Checkout 4 | Be&Be Drinks Spain</title>

  <!-- =========================================================
       TIPOGRAFÍAS PRINCIPALES DE LA WEB
       ========================================================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f3ec;
      --surface: #fbf8f3;
      --surface-soft: #f2ede4;
      --line: #e7dfd2;
      --text: #1e1916;
      --muted: #807467;
      --soft: #aa9a88;
      --accent: #c7a27d;
      --dark: #111111;
      --success: #315d36;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(251, 248, 243, 0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 24px;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .topbar-link {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .checkout-steps-wrap {
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .checkout-steps {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 22px 0;
      display: grid;
      grid-template-columns: 1fr 60px 1fr 60px 1fr 60px 1fr;
      align-items: center;
      gap: 0;
    }

    .checkout-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }

    .checkout-step-circle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.25s ease;
    }

    .checkout-step-label {
      font-size: 12px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .checkout-step-line {
      height: 1px;
      background: var(--line);
      width: 100%;
    }

    .checkout-step.is-active .checkout-step-circle {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .checkout-step.is-active .checkout-step-label {
      color: var(--text);
      font-weight: 600;
    }

    .checkout-step.is-completed .checkout-step-circle {
      background: var(--dark);
      border-color: var(--dark);
      color: white;
    }

    .checkout-step.is-completed .checkout-step-label {
      color: var(--text);
    }

    .checkout-step-line.is-completed {
      background: var(--accent);
    }

    .page {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 56px 0 80px;
    }

    .confirmation-card {
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 36px;
    }

    .confirmation-head {
      max-width: 760px;
      margin-bottom: 34px;
    }

    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 12px;
      margin-bottom: 16px;
    }

    .title {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(46px, 7vw, 78px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 500;
      margin-bottom: 18px;
    }

    .intro {
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
      max-width: 760px;
    }

    .success-box {
      display: grid;
      grid-template-columns: 74px 1fr;
      gap: 20px;
      align-items: start;
      padding: 24px;
      background: #f5f1ea;
      border: 1px solid #e6dccd;
      margin-bottom: 28px;
    }

    .success-icon {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: var(--success);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      line-height: 1;
    }

    .success-text h2 {
      font-family: "Cormorant Garamond", serif;
      font-size: 36px;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .success-text p {
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
    }

    .confirmation-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(300px, 0.8fr);
      gap: 28px;
      align-items: start;
    }

    .panel,
    .summary-box,
    .empty-box {
      background: white;
      border: 1px solid var(--line);
      padding: 28px;
    }

    .panel h3,
    .summary-box h3,
    .empty-box h2 {
      font-family: "Cormorant Garamond", serif;
      font-size: 30px;
      font-weight: 500;
      margin-bottom: 14px;
    }

    .panel p,
    .summary-box p,
    .empty-box p {
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
    }

    .info-grid {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(231, 223, 210, 0.7);
    }

    .info-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .info-label {
      color: var(--soft);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 12px;
      min-width: 130px;
    }

    .info-value {
      color: var(--text);
      text-align: right;
      line-height: 1.7;
    }

    .summary-lines {
      display: grid;
      gap: 14px;
      margin: 18px 0 24px;
    }

    .summary-line,
    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .summary-line {
      color: var(--muted);
      font-size: 15px;
    }

    .summary-total {
      border-top: 1px solid var(--line);
      padding-top: 18px;
      font-size: 19px;
      font-weight: 600;
      color: var(--text);
    }

    .summary-items {
      display: grid;
      gap: 14px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }

    .summary-item {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 12px;
      align-items: center;
      font-size: 14px;
      color: var(--muted);
    }

    .summary-item-image {
      width: 56px;
      height: 56px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      padding: 6px;
    }

    .summary-item-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .summary-item-info {
      display: grid;
      gap: 4px;
    }

    .summary-item-info strong {
      color: var(--text);
      font-weight: 600;
    }

    .summary-item-meta {
      font-size: 13px;
      color: var(--muted);
    }

    .summary-item-price {
      color: var(--text);
      font-weight: 600;
      white-space: nowrap;
    }

    .summary-note {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      margin-top: 20px;
    }

    .final-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    .primary-btn,
    .secondary-btn {
      border: none;
      padding: 15px 18px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .primary-btn {
      background: var(--dark);
      color: white;
    }

    .secondary-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }

    .empty-actions {
      margin-top: 22px;
    }

    .empty-link {
      display: inline-block;
      background: var(--dark);
      color: white;
      padding: 15px 18px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
    }

    @media (max-width: 900px) {
      .confirmation-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .topbar-inner,
      .checkout-steps,
      .page {
        width: calc(100% - 24px);
      }

      .topbar-inner {
        min-height: auto;
        padding: 18px 0;
      }

      .checkout-steps {
        grid-template-columns: 1fr;
        gap: 14px;
        padding: 18px 0 20px;
      }

      .checkout-step {
        flex-direction: row;
        justify-content: flex-start;
        text-align: left;
        gap: 14px;
      }

      .checkout-step-line {
        height: 18px;
        width: 1px;
        margin: 0 auto;
      }

      .page {
        padding: 40px 0 56px;
      }

      .confirmation-card,
      .panel,
      .summary-box,
      .empty-box {
        padding: 20px;
      }

      .success-box {
        grid-template-columns: 1fr;
      }

      .success-text h2 {
        font-size: 30px;
      }

      .info-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .info-value {
        text-align: left;
      }

      .summary-item {
        grid-template-columns: 56px 1fr;
        align-items: start;
      }

      .summary-item-price {
        grid-column: 2 / 3;
      }

      .final-actions {
        display: grid;
        grid-template-columns: 1fr;
      }

      .primary-btn,
      .secondary-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand-name">Be&Be Drinks Spain</div>
      <a href="index.html" class="topbar-link">Volver al inicio</a>
    </div>
  </header>

  <section class="checkout-steps-wrap">
    <div class="checkout-steps">
      <div class="checkout-step is-completed">
        <div class="checkout-step-circle">1</div>
        <p class="checkout-step-label">Revisión</p>
      </div>

      <div class="checkout-step-line is-completed"></div>

      <div class="checkout-step is-completed">
        <div class="checkout-step-circle">2</div>
        <p class="checkout-step-label">Datos</p>
      </div>

      <div class="checkout-step-line is-completed"></div>

      <div class="checkout-step is-completed">
        <div class="checkout-step-circle">3</div>
        <p class="checkout-step-label">Pago</p>
      </div>

      <div class="checkout-step-line is-completed"></div>

      <div class="checkout-step is-active">
        <div class="checkout-step-circle">4</div>
        <p class="checkout-step-label">Confirmación final</p>
      </div>
    </div>
  </section>

  <main class="page">
    <div id="confirmationContent"></div>
  </main>

  <script>
    const CART_KEY = "bebeb-drinks-cart";
    const CHECKOUT_DATA_KEY = "bebeb-drinks-checkout-data";
    const ORDER_CONFIRMED_KEY = "bebeb-drinks-order-confirmed";
    const ORDER_NUMBER_KEY = "bebeb-drinks-order-number";
    const ORDER_SNAPSHOT_KEY = "bebeb-drinks-order-snapshot";

    function getCart() {
      const savedCart = localStorage.getItem(CART_KEY);
      return savedCart ? JSON.parse(savedCart) : [];
    }

    function getSavedCheckoutData() {
      const savedData = localStorage.getItem(CHECKOUT_DATA_KEY);
      return savedData ? JSON.parse(savedData) : {};
    }

    function formatPrice(price) {
      return "€" + price.toFixed(2);
    }

    function getCartTotals(cart) {
      const totalUnits = cart.reduce((sum, item) => sum + item.quantity, 0);
      const totalPrice = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

      return {
        totalUnits,
        totalPrice
      };
    }

    function generateOrderNumber() {
      const randomNumber = Math.floor(1000 + Math.random() * 9000);
      return "BB-" + randomNumber;
    }

    function createFreshOrderSnapshot(cart, customerData) {
      const { totalUnits, totalPrice } = getCartTotals(cart);
      const orderNumber = generateOrderNumber();

      const snapshot = {
        orderNumber,
        cart,
        customerData,
        totalUnits,
        totalPrice
      };

      localStorage.setItem(ORDER_NUMBER_KEY, orderNumber);
      localStorage.setItem(ORDER_SNAPSHOT_KEY, JSON.stringify(snapshot));

      return snapshot;
    }

    function clearCartAfterConfirmation() {
      localStorage.removeItem(CART_KEY);
    }

    function renderInvalidAccess() {
      const confirmationContent = document.getElementById("confirmationContent");

      confirmationContent.innerHTML = `
        <section class="empty-box">
          <h2>No hay una confirmación disponible</h2>
          <p>
            Esta página se muestra después de confirmar un pedido.
            Vuelve a la tienda para continuar con la compra.
          </p>
          <div class="empty-actions">
            <a href="productos.html" class="empty-link">Ir a productos</a>
          </div>
        </section>
      `;
    }

    function renderCheckoutStepFour() {
      const confirmationContent = document.getElementById("confirmationContent");
      const isConfirmed = localStorage.getItem(ORDER_CONFIRMED_KEY);
      const cart = getCart();
      const customerData = getSavedCheckoutData();
      const storedSnapshot = localStorage.getItem(ORDER_SNAPSHOT_KEY);

      let snapshot = null;

      if (isConfirmed === "true") {
        if (cart.length === 0) {
          renderInvalidAccess();
          return;
        }

        snapshot = createFreshOrderSnapshot(cart, customerData);
        clearCartAfterConfirmation();
        localStorage.removeItem(ORDER_CONFIRMED_KEY);
      } else if (storedSnapshot) {
        snapshot = JSON.parse(storedSnapshot);
      } else {
        renderInvalidAccess();
        return;
      }

      const summaryItemsHTML = snapshot.cart.map(item => `
        <div class="summary-item">
          <div class="summary-item-image">
            <img src="${item.image}" alt="${item.name}">
          </div>

          <div class="summary-item-info">
            <strong>${item.name}</strong>
            <span class="summary-item-meta">Cantidad: ${item.quantity}</span>
          </div>

          <div class="summary-item-price">
            ${formatPrice(item.price * item.quantity)}
          </div>
        </div>
      `).join("");

      confirmationContent.innerHTML = `
        <section class="confirmation-card">
          <div class="confirmation-head">
            <p class="eyebrow">Pedido completado</p>
            <h1 class="title">Gracias por tu compra</h1>
            <p class="intro">
              Hemos recibido correctamente tu pedido. En breve recibirás un correo de confirmación
              en <strong>${snapshot.customerData.email || "tu correo electrónico"}</strong> con el resumen de la compra.
            </p>
          </div>

          <div class="success-box">
            <div class="success-icon">✓</div>

            <div class="success-text">
              <h2>Pedido confirmado</h2>
              <p>
                Tu pedido ha quedado registrado con el número
                <strong>${snapshot.orderNumber}</strong>. Conserva esta referencia por si necesitas consultarnos algo más adelante.
              </p>
            </div>
          </div>

          <div class="confirmation-layout">
            <section class="panel">
              <h3>Detalles del pedido</h3>
              <p>
                Este es el resumen final de la compra y los datos principales asociados al pedido.
              </p>

              <div class="info-grid">
                <div class="info-row">
                  <span class="info-label">Número de pedido</span>
                  <span class="info-value">${snapshot.orderNumber}</span>
                </div>

                <div class="info-row">
                  <span class="info-label">Cliente</span>
                  <span class="info-value">
                    ${(snapshot.customerData.nombre || "")} ${(snapshot.customerData.apellidos || "")}
                  </span>
                </div>

                <div class="info-row">
                  <span class="info-label">Correo</span>
                  <span class="info-value">${snapshot.customerData.email || "-"}</span>
                </div>

                <div class="info-row">
                  <span class="info-label">Teléfono</span>
                  <span class="info-value">${snapshot.customerData.telefono || "-"}</span>
                </div>

                <div class="info-row">
                  <span class="info-label">Entrega</span>
                  <span class="info-value">
                    ${snapshot.customerData.direccion || "-"}<br>
                    ${snapshot.customerData.ciudad || ""} ${snapshot.customerData.codigoPostal || ""}
                  </span>
                </div>

                <div class="info-row">
                  <span class="info-label">Siguiente paso</span>
                  <span class="info-value">
                    Recibirás un correo de confirmación y, más adelante, la información del envío.
                  </span>
                </div>
              </div>

              <div class="final-actions">
                <a href="index.html" class="primary-btn">Volver al inicio</a>
                <a href="productos.html" class="secondary-btn">Seguir comprando</a>
              </div>
            </section>

            <aside class="summary-box">
              <h3>Resumen final</h3>

              <div class="summary-lines">
                <div class="summary-line">
                  <span>Productos distintos</span>
                  <span>${snapshot.cart.length}</span>
                </div>

                <div class="summary-line">
                  <span>Unidades totales</span>
                  <span>${snapshot.totalUnits}</span>
                </div>

                <div class="summary-total">
                  <span>Total</span>
                  <span>${formatPrice(snapshot.totalPrice)}</span>
                </div>
              </div>

              <div class="summary-items">
                ${summaryItemsHTML}
              </div>

              <p class="summary-note">
                Esta pantalla sirve como cierre visual del pedido. Más adelante podrás conectar
                el envío real del correo y la confirmación de pago automática.
              </p>
            </aside>
          </div>
        </section>
      `;
    }

    renderCheckoutStepFour();
  </script>
</body>
</html>
