<!DOCTYPE html>
<html lang="es">
<head>
  <!-- =========================================================
       CONFIGURACIÓN BÁSICA DEL DOCUMENTO
       ========================================================= -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título de la página -->
  <title>Checkout 1 | Be&Be Drinks Spain</title>

  <!-- =========================================================
       TIPOGRAFÍAS PRINCIPALES DE LA WEB
       - Serif elegante para títulos
       - Sans serif limpia para lectura y navegación
       ========================================================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* =========================================================
       VARIABLES GLOBALES DE COLOR
       ========================================================= */
    :root {
      --bg: #f7f3ec;
      --surface: #fbf8f3;
      --surface-soft: #f2ede4;
      --line: #e7dfd2;
      --text: #1e1916;
      --muted: #807467;
      --soft: #aa9a88;
      --accent: #c7a27d;
      --dark: #111111;
      --success: #2f5a31;
    }

    /* =========================================================
       RESET BÁSICO
       - Limpia márgenes y paddings por defecto
       - Hace más consistente el renderizado
       ========================================================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    button,
    input {
      font: inherit;
    }

    /* =========================================================
       CABECERA DE CHECKOUT
       - Mantiene una versión más limpia que el header general
       - Centra la atención del usuario en el proceso de compra
       ========================================================= */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(251, 248, 243, 0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 24px;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .topbar-link {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    /* =========================================================
       FLUJO VISUAL DE PASOS
       - Círculos numerados unidos por líneas
       - Paso activo resaltado
       - Más adelante podremos marcar pasos completados
       ========================================================= */
    .checkout-steps-wrap {
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .checkout-steps {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 22px 0;
      display: grid;
      grid-template-columns: 1fr 60px 1fr 60px 1fr 60px 1fr;
      align-items: center;
      gap: 0;
    }

    .checkout-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }

    .checkout-step-circle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.25s ease;
    }

    .checkout-step-label {
      font-size: 12px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .checkout-step-line {
      height: 1px;
      background: var(--line);
      width: 100%;
    }

    /* Estado del paso actual */
    .checkout-step.is-active .checkout-step-circle {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .checkout-step.is-active .checkout-step-label {
      color: var(--text);
      font-weight: 600;
    }

    /* Estado de paso completado
       - Este estado ya queda preparado para próximas páginas */
    .checkout-step.is-completed .checkout-step-circle {
      background: var(--dark);
      border-color: var(--dark);
      color: white;
    }

    .checkout-step.is-completed .checkout-step-label {
      color: var(--text);
    }

    .checkout-step-line.is-completed {
      background: var(--accent);
    }

    /* =========================================================
       CONTENIDO PRINCIPAL DE LA PÁGINA
       ========================================================= */
    .page {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 56px 0 80px;
    }

    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 12px;
      margin-bottom: 16px;
    }

    .title {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(46px, 7vw, 78px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 500;
      margin-bottom: 18px;
    }

    .intro {
      max-width: 720px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
      margin-bottom: 34px;
    }

    /* =========================================================
       ESTRUCTURA PRINCIPAL DEL CHECKOUT
       - Columna izquierda: pedido
       - Columna derecha: resumen y acciones
       ========================================================= */
    .checkout-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(280px, 0.85fr);
      gap: 28px;
      align-items: start;
    }

    .panel,
    .summary-box {
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 32px;
    }

    .panel h2,
    .summary-box h2,
    .empty-box h2 {
      font-family: "Cormorant Garamond", serif;
      font-size: 34px;
      font-weight: 500;
      margin-bottom: 14px;
    }

    .panel p,
    .summary-box p,
    .empty-box p {
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
    }

    /* =========================================================
       LISTADO DE PRODUCTOS DEL PEDIDO
       ========================================================= */
    .checkout-items {
      display: grid;
      gap: 18px;
      margin-top: 22px;
    }

    .checkout-item {
      display: grid;
      grid-template-columns: 88px 1fr auto;
      gap: 18px;
      align-items: start;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .checkout-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .checkout-item-image {
      width: 88px;
      height: 88px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      padding: 10px;
    }

    .checkout-item-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .checkout-item-name {
      font-size: 19px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .checkout-item-meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 6px;
    }

    .checkout-item-qty {
      color: var(--soft);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 12px;
    }

    .checkout-item-total {
      font-size: 17px;
      font-weight: 600;
      white-space: nowrap;
    }

    /* =========================================================
       CAJA DE RESUMEN DE COMPRA
       ========================================================= */
    .summary-lines {
      display: grid;
      gap: 14px;
      margin: 18px 0 24px;
    }

    .summary-line,
    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .summary-line {
      color: var(--muted);
      font-size: 15px;
    }

    .summary-total {
      border-top: 1px solid var(--line);
      padding-top: 18px;
      font-size: 19px;
      font-weight: 600;
    }

    .summary-note {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 22px;
    }

    .summary-actions {
      display: grid;
      gap: 12px;
    }

    .primary-btn,
    .secondary-btn {
      width: 100%;
      border: none;
      padding: 15px 18px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .primary-btn {
      background: var(--dark);
      color: white;
    }

    .secondary-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }

    /* =========================================================
       ESTADO VACÍO DEL CHECKOUT
       - Si no hay productos en carrito, no dejamos avanzar
       ========================================================= */
    .empty-box {
      max-width: 760px;
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 32px;
    }

    .empty-actions {
      margin-top: 22px;
    }

    .empty-link {
      display: inline-block;
      background: var(--dark);
      color: white;
      padding: 15px 18px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
    }

    /* =========================================================
       AJUSTES RESPONSIVE
       ========================================================= */
    @media (max-width: 900px) {
      .checkout-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .topbar-inner,
      .checkout-steps,
      .page {
        width: calc(100% - 24px);
      }

      .topbar-inner {
        min-height: auto;
        padding: 18px 0;
      }

      .checkout-steps {
        grid-template-columns: 1fr;
        gap: 14px;
        padding: 18px 0 20px;
      }

      .checkout-step {
        flex-direction: row;
        justify-content: flex-start;
        text-align: left;
        gap: 14px;
      }

      .checkout-step-line {
        height: 18px;
        width: 1px;
        margin: 0 auto;
      }

      .page {
        padding: 40px 0 56px;
      }

      .panel,
      .summary-box,
      .empty-box {
        padding: 20px;
      }

      .panel h2,
      .summary-box h2,
      .empty-box h2 {
        font-size: 28px;
      }

      .checkout-item {
        grid-template-columns: 1fr;
      }

      .checkout-item-image {
        width: 84px;
        height: 84px;
      }
    }
  </style>
</head>
<body>
  <!-- =========================================================
       CABECERA DEL CHECKOUT
       - Marca principal
       - Enlace para volver al carrito
       ========================================================= -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand-name">Be&Be Drinks Spain</div>
      <a href="carrito.html" class="topbar-link">Volver al carrito</a>
    </div>
  </header>

  <!-- =========================================================
       FLUJO VISUAL DE PASOS
       - En esta primera página solo está activo el paso 1
       ========================================================= -->
  <section class="checkout-steps-wrap">
    <div class="checkout-steps">
      <div class="checkout-step is-active">
        <div class="checkout-step-circle">1</div>
        <p class="checkout-step-label">Confirmación</p>
      </div>

      <div class="checkout-step-line"></div>

      <div class="checkout-step">
        <div class="checkout-step-circle">2</div>
        <p class="checkout-step-label">Datos</p>
      </div>

      <div class="checkout-step-line"></div>

      <div class="checkout-step">
        <div class="checkout-step-circle">3</div>
        <p class="checkout-step-label">Pago</p>
      </div>

      <div class="checkout-step-line"></div>

      <div class="checkout-step">
        <div class="checkout-step-circle">4</div>
        <p class="checkout-step-label">Confirmación final</p>
      </div>
    </div>
  </section>

  <!-- =========================================================
       CONTENIDO PRINCIPAL
       ========================================================= -->
  <main class="page">
    <p class="eyebrow">Checkout</p>
    <h1 class="title">Confirmar compra</h1>
    <p class="intro">
      Revisa tu selección antes de continuar. En el siguiente paso podrás completar
      los datos necesarios para preparar el pedido.
    </p>

    <!-- Aquí se insertará dinámicamente el contenido del checkout -->
    <div id="checkoutContent"></div>
  </main>

  <script>
    /* =========================================================
       CLAVE DEL CARRITO EN EL NAVEGADOR
       - Debe coincidir con la usada en carrito y productos
       ========================================================= */
    const CART_KEY = "bebeb-drinks-cart";

    /* =========================================================
       OBTENER EL CARRITO DESDE LOCALSTORAGE
       - Si hay datos guardados, los convertimos en array
       - Si no hay nada, devolvemos un array vacío
       ========================================================= */
    function getCart() {
      const savedCart = localStorage.getItem(CART_KEY);
      return savedCart ? JSON.parse(savedCart) : [];
    }

    /* =========================================================
       FORMATEAR PRECIOS
       - Convierte un número al formato visual en euros
       ========================================================= */
    function formatPrice(price) {
      return "€" + price.toFixed(2);
    }

    /* =========================================================
       CALCULAR TOTALES DEL PEDIDO
       - totalUnits: suma de todas las cantidades
       - totalPrice: importe total del pedido
       ========================================================= */
    function getCartTotals(cart) {
      const totalUnits = cart.reduce((sum, item) => sum + item.quantity, 0);
      const totalPrice = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

      return {
        totalUnits,
        totalPrice
      };
    }

    /* =========================================================
       MOSTRAR ESTADO VACÍO
       - Si el carrito está vacío, no permitimos seguir checkout
       ========================================================= */
    function renderEmptyCheckout() {
      const checkoutContent = document.getElementById("checkoutContent");

      checkoutContent.innerHTML = `
        <section class="empty-box">
          <h2>No hay productos para confirmar</h2>
          <p>
            Tu carrito está vacío en este momento. Antes de iniciar la compra,
            añade al menos una bebida desde la página de productos.
          </p>
          <div class="empty-actions">
            <a href="productos.html" class="empty-link">Ver productos</a>
          </div>
        </section>
      `;
    }

    /* =========================================================
       RENDERIZAR EL PASO 1 DEL CHECKOUT
       - Muestra los productos seleccionados
       - Muestra el resumen del pedido
       - Ofrece avanzar o cancelar y volver al carrito
       ========================================================= */
    function renderCheckoutStepOne() {
      const cart = getCart();
      const checkoutContent = document.getElementById("checkoutContent");

      /* Si no hay productos, mostramos el estado vacío */
      if (cart.length === 0) {
        renderEmptyCheckout();
        return;
      }

      const { totalUnits, totalPrice } = getCartTotals(cart);

      /* Creamos el HTML de cada línea del pedido */
      const itemsHTML = cart.map(item => `
        <article class="checkout-item">
          <div class="checkout-item-image">
            <img src="${item.image}" alt="${item.name}">
          </div>

          <div>
            <h3 class="checkout-item-name">${item.name}</h3>
            <p class="checkout-item-meta">Precio unitario: ${formatPrice(item.price)}</p>
            <p class="checkout-item-qty">Cantidad seleccionada: ${item.quantity}</p>
          </div>

          <div class="checkout-item-total">
            ${formatPrice(item.price * item.quantity)}
          </div>
        </article>
      `).join("");

      /* Insertamos la estructura completa del paso 1 */
      checkoutContent.innerHTML = `
        <div class="checkout-layout">
          <section class="panel">
            <h2>Tu pedido</h2>
            <p>
              Este es el resumen previo de tu compra. Si todo está correcto,
              continúa al siguiente paso para introducir tus datos.
            </p>

            <div class="checkout-items">
              ${itemsHTML}
            </div>
          </section>

          <aside class="summary-box">
            <h2>Resumen</h2>

            <div class="summary-lines">
              <div class="summary-line">
                <span>Productos distintos</span>
                <span>${cart.length}</span>
              </div>

              <div class="summary-line">
                <span>Unidades totales</span>
                <span>${totalUnits}</span>
              </div>

              <div class="summary-total">
                <span>Total</span>
                <span>${formatPrice(totalPrice)}</span>
              </div>
            </div>

            <p class="summary-note">
              En el siguiente paso te pediremos los datos necesarios para continuar
              con la compra.
            </p>

            <div class="summary-actions">
              <a href="checkout-2.html" class="primary-btn">Continuar con tus datos</a>
              <a href="carrito.html" class="secondary-btn">Cancelar y volver</a>
            </div>
          </aside>
        </div>
      `;
    }

    /* =========================================================
       INICIO DE LA PÁGINA
       - Al cargar, pintamos el paso 1 del checkout
       ========================================================= */
    renderCheckoutStepOne();
  </script>
</body>
</html>
