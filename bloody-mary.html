<!DOCTYPE html>
<html lang="es">
<head>
  <!-- =========================================================
       CONFIGURACIÓN BÁSICA DEL DOCUMENTO
       ========================================================= -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Título de la página -->
  <title>Bloody Mary | Be&Be Drinks Spain</title>

  <!-- =========================================================
       TIPOGRAFÍAS DE LA WEB
       ========================================================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* =========================================================
       VARIABLES GLOBALES
       ========================================================= */
    :root {
      --bg: #f5efe8;
      --bg-soft: #fbf7f2;
      --line: #ded6cc;
      --text: #1f1a17;
      --muted: #7d746a;
      --accent: #111111;
      --white: #ffffff;
      --success: #2f5a31;

      --dark-bg: #141913;
      --dark-text: #f2ede5;
      --dark-muted: #a8a39b;
      --dark-line: rgba(255,255,255,0.12);
      --gold: #c7a27d;
    }

    /* =========================================================
       RESET GENERAL
       ========================================================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button,
    input {
      font: inherit;
    }

    .container {
      width: min(1200px, 92%);
      margin: 0 auto;
    }

    /* =========================================================
       CABECERA PRINCIPAL
       - Formato actualizado:
         Inicio | Productos | Nosotros | carrito
       ========================================================= */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: rgba(245, 239, 232, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(6px);
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 86px;
      gap: 20px;
    }

    .brand {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.8rem;
      letter-spacing: 0.5px;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 28px;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-left: auto;
    }

    .nav a {
      opacity: 0.8;
      transition: opacity 0.25s ease;
    }

    .nav a:hover,
    .nav a.active {
      opacity: 1;
    }

    .cart-icon {
      border: 1px solid var(--line);
      padding: 12px 14px;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #c7a27d;
      background: transparent;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .cart-icon:hover {
      background: var(--bg-soft);
      border-color: #dcccba;
      transform: translateY(-1px);
    }

    .cart-count {
      min-width: 20px;
      height: 20px;
      border-radius: 999px;
      background: var(--accent);
      color: var(--white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      line-height: 1;
      padding: 0 6px;
    }

    /* =========================================================
       PÁGINA DE PRODUCTO
       ========================================================= */
    .product-page {
      padding: 48px 0 80px;
    }

    .breadcrumb {
      margin-bottom: 28px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .breadcrumb a:hover {
      text-decoration: underline;
    }

    .product-layout {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 56px;
      align-items: start;
    }

    /* =========================================================
       GALERÍA DE IMÁGENES
       - Se amplía para mostrar más fotos nuevas de Bloody
       ========================================================= */
    .product-gallery {
      display: grid;
      gap: 18px;
    }

    .main-image {
      background: var(--bg-soft);
      border: 1px solid var(--line);
      padding: 28px;
    }

    .main-image img {
      width: 100%;
      max-height: 620px;
      object-fit: contain;
      margin: 0 auto;
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .thumb {
      background: var(--bg-soft);
      border: 1px solid var(--line);
      padding: 12px;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .thumb:hover {
      transform: translateY(-2px);
      border-color: #b8aa9b;
    }

    .thumb img {
      height: 130px;
      width: 100%;
      object-fit: contain;
    }

    /* =========================================================
       INFORMACIÓN DEL PRODUCTO
       ========================================================= */
    .product-info {
      padding-top: 8px;
    }

    .product-tag {
      font-size: 0.82rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .product-title {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 400;
      line-height: 0.95;
      margin-bottom: 18px;
    }

    .product-subtitle {
      font-size: 0.92rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 26px;
    }

    .product-description {
      font-size: 1.05rem;
      color: #403833;
      margin-bottom: 28px;
      max-width: 52ch;
    }

    .product-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-bottom: 28px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .product-price {
      font-size: 2rem;
      margin-bottom: 8px;
      font-family: "Cormorant Garamond", serif;
    }

    .product-price-unit {
      display: block;
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 6px;
      font-family: "Inter", Arial, sans-serif;
    }

    /* =========================================================
       CAJA DE COMPRA
       ========================================================= */
    .purchase-box {
      background: var(--bg-soft);
      border: 1px solid var(--line);
      padding: 24px;
      margin-bottom: 28px;
    }

    .quantity-label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .quantity-label-center {
      text-align: center;
      margin-top: 4px;
    }

    .pack-options {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .pack-btn {
      min-width: 124px;
      border: 1px solid var(--line);
      background: var(--white);
      color: var(--text);
      padding: 13px 16px;
      font-size: 0.82rem;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .pack-btn:hover {
      transform: translateY(-1px);
      border-color: #b8aa9b;
      background: #f8f3ec;
    }

    .quantity-selector-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .quantity-selector {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      background: var(--white);
    }

    .quantity-selector button {
      width: 46px;
      height: 46px;
      border: none;
      background: transparent;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .quantity-selector input {
      width: 72px;
      height: 46px;
      border: none;
      text-align: center;
      font-size: 1rem;
      outline: none;
      background: transparent;
    }

    /* =========================================================
       PRECIO TOTAL CALCULADO
       ========================================================= */
    .total-box {
      margin: 6px 0 20px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      background: var(--white);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    .total-label {
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }

    .total-price {
      font-family: "Cormorant Garamond", serif;
      font-size: 2rem;
      line-height: 1;
      color: var(--accent);
      text-align: right;
    }

    .add-cart-btn {
      width: 100%;
      border: none;
      background: var(--accent);
      color: var(--white);
      padding: 16px 20px;
      font-size: 0.95rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.25s ease;
    }

    .add-cart-btn:hover {
      opacity: 0.9;
    }

    .purchase-note {
      margin-top: 14px;
      font-size: 0.95rem;
      color: var(--muted);
      text-align: center;
    }

    .cart-feedback {
      margin-top: 14px;
      font-size: 0.95rem;
      color: var(--success);
      display: none;
      text-align: center;
    }

    .cart-feedback.show {
      display: block;
    }

    /* =========================================================
       DETALLES DEL PRODUCTO
       ========================================================= */
    .details-box {
      border-top: 1px solid var(--line);
      padding-top: 24px;
    }

    .details-box h2 {
      font-size: 1.2rem;
      margin-bottom: 14px;
      font-weight: 400;
      font-family: "Cormorant Garamond", serif;
    }

    .details-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      margin-top: 8px;
    }

    .details-table th,
    .details-table td {
      text-align: left;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    .details-table th {
      width: 30%;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      background: rgba(255,255,255,0.4);
    }

    .details-table td {
      color: #3d3630;
      font-size: 0.96rem;
      line-height: 1.7;
    }

    .details-table tr:last-child th,
    .details-table tr:last-child td {
      border-bottom: none;
    }

    .back-link {
      display: inline-block;
      margin-top: 28px;
      color: var(--muted);
    }

    .back-link:hover {
      text-decoration: underline;
    }

    /* =========================================================
       FOOTER OSCURO
       ========================================================= */
    .ending {
      background: var(--dark-bg);
      color: var(--dark-text);
      padding: 84px 0 28px;
      margin-top: 40px;
    }

    .ending-inner {
      width: min(1200px, 92%);
      margin: 0 auto;
    }

    .ending-title {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(78px, 13vw, 150px);
      line-height: 0.84;
      letter-spacing: -0.055em;
      font-weight: 500;
      margin-bottom: 32px;
      max-width: 760px;
    }

    .ending-title .outline {
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,0.20);
      opacity: 0.9;
    }

    .ending-brand {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 96px;
      color: #d8d0c4;
    }

    .ending-brand .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      overflow: hidden;
      flex: 0 0 38px;
      background: #0b0d0b;
    }

    .ending-brand .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ending-brand .brand-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 34px;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .footer-links {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      padding: 28px 0 48px;
    }

    .footer-column h4 {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 12px;
      color: var(--dark-muted);
      margin-bottom: 18px;
    }

    .footer-column a {
      display: block;
      margin-bottom: 14px;
      color: var(--dark-text);
      opacity: 0.92;
      transition: opacity 0.2s ease, color 0.2s ease;
    }

    .footer-column a:hover {
      opacity: 1;
      color: #ffffff;
    }

    .footer-bottom {
      border-top: 1px solid var(--dark-line);
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
      gap: 24px;
      color: var(--dark-muted);
      font-size: 13px;
    }

    .footer-bottom .footer-brand {
      font-family: "Cormorant Garamond", serif;
      font-size: 22px;
      color: var(--dark-text);
    }

    /* =========================================================
       RESPONSIVE
       ========================================================= */
    @media (max-width: 900px) {
      .product-layout {
        grid-template-columns: 1fr;
        gap: 34px;
      }

      .product-title {
        font-size: 3rem;
      }

      .nav {
        gap: 16px;
        font-size: 0.78rem;
      }

      .total-box {
        flex-direction: column;
        align-items: flex-start;
      }

      .total-price {
        text-align: left;
      }
    }

    @media (max-width: 640px) {
      .header-inner {
        flex-direction: column;
        justify-content: center;
        padding: 16px 0;
      }

      .brand {
        font-size: 1.4rem;
      }

      .nav {
        flex-wrap: wrap;
        justify-content: center;
      }

      .thumbs {
        grid-template-columns: 1fr 1fr;
      }

      .thumb img {
        height: 90px;
      }

      .product-page {
        padding-top: 30px;
      }

      .pack-btn {
        width: 100%;
      }

      .footer-links {
        grid-template-columns: 1fr;
      }

      .footer-bottom {
        flex-direction: column;
      }

      .ending {
        padding: 56px 0 24px;
      }

      .ending-brand {
        margin-bottom: 52px;
      }
    }
  </style>
</head>
<body>

  <!-- =========================================================
       CABECERA PRINCIPAL
       - Ajustada al nuevo formato:
         Inicio | Productos | Nosotros | carrito
       ========================================================= -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">Be&Be Drinks Spain</a>

      <nav class="nav">
        <a href="index.html">Inicio</a>
        <a href="productos.html" class="active">Productos</a>
        <a href="nosotros.html">Nosotros</a>
        <a href="carrito.html" class="cart-icon" aria-label="Ver carrito">
          <span>🛒</span>
          <span id="cartCount" class="cart-count">0</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- =========================================================
       CONTENIDO PRINCIPAL DEL PRODUCTO
       ========================================================= -->
  <main class="product-page">
    <div class="container">

      <!-- Migas de pan -->
      <div class="breadcrumb">
        <a href="index.html">Inicio</a> /
        <a href="productos.html">Productos</a> /
        <span>Bloody Mary</span>
      </div>

      <section class="product-layout">
        <!-- =====================================================
             GALERÍA DE IMÁGENES
             - Se añaden las nuevas imágenes de Bloody vistas
               en el repositorio
             ===================================================== -->
        <div class="product-gallery">
          <!-- Imagen principal visible -->
          <div class="main-image">
            <img id="mainProductImage" src="images/BOODY.jpeg" alt="Lata de Bloody Mary Be&Be Drinks Spain">
          </div>

          <!-- Miniaturas de la galería
               Archivos añadidos según tu captura:
               - Bloody - Marketing.png
               - Bloody - pack 12.png
               - Bloody - pack 24.png
               - bloody - pack 6.png -->
          <div class="thumbs">
            <button class="thumb" type="button" onclick="changeImage('images/BOODY.jpeg')">
              <img src="images/BOODY.jpeg" alt="Vista principal de Bloody Mary">
            </button>

            <button class="thumb" type="button" onclick="changeImage('images/Bloody - Marketing.png')">
              <img src="images/Bloody - Marketing.png" alt="Imagen marketing de Bloody Mary">
            </button>

            <button class="thumb" type="button" onclick="changeImage('images/bloody - pack 6.png')">
              <img src="images/bloody - pack 6.png" alt="Pack de 6 de Bloody Mary">
            </button>

            <button class="thumb" type="button" onclick="changeImage('images/Bloody - pack 12.png')">
              <img src="images/Bloody - pack 12.png" alt="Pack de 12 de Bloody Mary">
            </button>

            <button class="thumb" type="button" onclick="changeImage('images/Bloody - pack 24.png')">
              <img src="images/Bloody - pack 24.png" alt="Pack de 24 de Bloody Mary">
            </button>
          </div>
        </div>

        <!-- =====================================================
             INFORMACIÓN Y COMPRA
             ===================================================== -->
        <div class="product-info">
          <p class="product-tag">Cóctel en lata</p>
          <h1 class="product-title">Bloody Mary</h1>
          <p class="product-subtitle">Tomate · Vodka · Especias</p>

          <p class="product-description">
            Una receta intensa, sabrosa y con carácter. Pensada para quienes buscan una bebida lista para servir, con perfil especiado y personalidad propia.
          </p>

          <div class="product-meta">
            <span>33
