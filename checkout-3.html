<!DOCTYPE html>
<html lang="es">
<head>
  <!-- =========================================================
       CONFIGURACIÓN BÁSICA DEL DOCUMENTO
       ========================================================= -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título de la página -->
  <title>Checkout 3 | Be&Be Drinks Spain</title>

  <!-- =========================================================
       TIPOGRAFÍAS PRINCIPALES DE LA WEB
       ========================================================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* =========================================================
       VARIABLES GLOBALES
       ========================================================= */
    :root {
      --bg: #f7f3ec;
      --surface: #fbf8f3;
      --surface-soft: #f2ede4;
      --line: #e7dfd2;
      --text: #1e1916;
      --muted: #807467;
      --soft: #aa9a88;
      --accent: #c7a27d;
      --dark: #111111;
      --success: #2f5a31;
      --error: #9f4d45;
    }

    /* =========================================================
       RESET BÁSICO
       ========================================================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    /* =========================================================
       CABECERA DE CHECKOUT
       ========================================================= */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(251, 248, 243, 0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 24px;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .topbar-link {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    /* =========================================================
       FLUJO VISUAL DE PASOS
       - Pasos 1 y 2 completados
       - Paso 3 activo
       ========================================================= */
    .checkout-steps-wrap {
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .checkout-steps {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 22px 0;
      display: grid;
      grid-template-columns: 1fr 60px 1fr 60px 1fr 60px 1fr;
      align-items: center;
      gap: 0;
    }

    .checkout-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }

    .checkout-step-circle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.25s ease;
    }

    .checkout-step-label {
      font-size: 12px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .checkout-step-line {
      height: 1px;
      background: var(--line);
      width: 100%;
    }

    .checkout-step.is-active .checkout-step-circle {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .checkout-step.is-active .checkout-step-label {
      color: var(--text);
      font-weight: 600;
    }

    .checkout-step.is-completed .checkout-step-circle {
      background: var(--dark);
      border-color: var(--dark);
      color: white;
    }

    .checkout-step.is-completed .checkout-step-label {
      color: var(--text);
    }

    .checkout-step-line.is-completed {
      background: var(--accent);
    }

    /* =========================================================
       CONTENIDO PRINCIPAL
       ========================================================= */
    .page {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 56px 0 80px;
    }

    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 12px;
      margin-bottom: 16px;
    }

    .title {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(46px, 7vw, 78px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 500;
      margin-bottom: 18px;
    }

    .intro {
      max-width: 760px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
      margin-bottom: 34px;
    }

    .checkout-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
      gap: 28px;
      align-items: start;
    }

    .panel,
    .summary-box,
    .empty-box {
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 32px;
    }

    .panel h2,
    .summary-box h2,
    .empty-box h2,
    .box-title {
      font-family: "Cormorant Garamond", serif;
      font-size: 34px;
      font-weight: 500;
      margin-bottom: 14px;
    }

    .panel p,
    .summary-box p,
    .empty-box p {
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
    }

    /* =========================================================
       BLOQUES DE REVISIÓN
       ========================================================= */
    .review-section + .review-section {
      margin-top: 28px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
    }

    .review-grid {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .review-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(231, 223, 210, 0.6);
    }

    .review-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .review-label {
      color: var(--soft);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 12px;
      min-width: 120px;
    }

    .review-value {
      color: var(--text);
      text-align: right;
      line-height: 1.7;
    }

    /* =========================================================
       BLOQUE DE PAGO VISUAL
       ========================================================= */
    .payment-box {
      margin-top: 22px;
      padding: 22px;
      background: #fffdfa;
      border: 1px solid #eadfce;
    }

    .payment-method {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .payment-method:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .payment-method:first-child {
      padding-top: 0;
    }

    .payment-name {
      font-size: 15px;
      color: var(--text);
    }

    .payment-badge {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--soft);
      border: 1px solid var(--line);
      padding: 6px 8px;
      background: white;
    }

    /* =========================================================
       BLOQUE DE CONFIANZA
       ========================================================= */
    .trust-box {
      margin-top: 22px;
      padding: 18px 20px;
      background: #f6f1ea;
      border: 1px solid #e6dbcc;
    }

    .trust-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--soft);
      margin-bottom: 10px;
    }

    .trust-list {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    /* =========================================================
       BOTONES Y ACCIONES
       - Botón secundario: volver atrás
       - Botón principal: confirmar pedido
       - Botón pequeño: cancelar compra
       ========================================================= */
    .review-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    .primary-btn,
    .secondary-btn {
      border: none;
      padding: 15px 18px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .primary-btn {
      background: var(--dark);
      color: white;
    }

    .secondary-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }

    .review-cancel {
      margin-top: 14px;
    }

    .cancel-link {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--soft);
    }

    /* =========================================================
       RESUMEN LATERAL
       ========================================================= */
    .summary-lines {
      display: grid;
      gap: 14px;
      margin: 18px 0 24px;
    }

    .summary-line,
    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .summary-line {
      color: var(--muted);
      font-size: 15px;
    }

    .summary-total {
      border-top: 1px solid var(--line);
      padding-top: 18px;
      font-size: 19px;
      font-weight: 600;
    }

    .summary-items {
      display: grid;
      gap: 12px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      font-size: 14px;
      color: var(--muted);
    }

    .summary-item strong {
      color: var(--text);
      font-weight: 600;
    }

    .summary-note {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      margin-top: 20px;
    }

    /* =========================================================
       ESTADO VACÍO
       ========================================================= */
    .empty-actions {
      margin-top: 22px;
    }

    .empty-link {
      display: inline-block;
      background: var(--dark);
      color: white;
      padding: 15px 18px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
    }

    /* =========================================================
       RESPONSIVE
       ========================================================= */
    @media (max-width: 900px) {
      .checkout-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .topbar-inner,
      .checkout-steps,
      .page {
        width: calc(100% - 24px);
      }

      .topbar-inner {
        min-height: auto;
        padding: 18px 0;
      }

      .checkout-steps {
        grid-template-columns: 1fr;
        gap: 14px;
        padding: 18px 0 20px;
      }

      .checkout-step {
        flex-direction: row;
        justify-content: flex-start;
        text-align: left;
        gap: 14px;
      }

      .checkout-step-line {
        height: 18px;
        width: 1px;
        margin: 0 auto;
      }

      .page {
        padding: 40px 0 56px;
      }

      .panel,
      .summary-box,
      .empty-box {
        padding: 20px;
      }

      .panel h2,
      .summary-box h2,
      .empty-box h2,
      .box-title {
        font-size: 28px;
      }

      .review-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .review-value {
        text-align: left;
      }

      .review-actions {
        display: grid;
        grid-template-columns: 1fr;
      }

      .primary-btn,
      .secondary-btn {
        width: 100%;
      }

      .payment-method {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <!-- =========================================================
       CABECERA DEL CHECKOUT
       ========================================================= -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand-name">Be&Be Drinks Spain</div>
      <a href="checkout-2.html" class="topbar-link">Volver al paso anterior</a>
    </div>
  </header>

  <!-- =========================================================
       FLUJO VISUAL DE PASOS
       ========================================================= -->
  <section class="checkout-steps-wrap">
    <div class="checkout-steps">
      <div class="checkout-step is-completed">
        <div class="checkout-step-circle">1</div>
        <p class="checkout-step-label">Confirmación</p>
      </div>

      <div class="checkout-step-line is-completed"></div>

      <div class="checkout-step is-completed">
        <div class="checkout-step-circle">2</div>
        <p class="checkout-step-label">Datos</p>
      </div>

      <div class="checkout-step-line is-completed"></div>

      <div class="checkout-step is-active">
        <div class="checkout-step-circle">3</div>
        <p class="checkout-step-label">Pago</p>
      </div>

      <div class="checkout-step-line"></div>

      <div class="checkout-step">
        <div class="checkout-step-circle">4</div>
        <p class="checkout-step-label">Confirmación final</p>
      </div>
    </div>
  </section>

  <!-- =========================================================
       CONTENIDO PRINCIPAL
       ========================================================= -->
  <main class="page">
    <p class="eyebrow">Checkout</p>
    <h1 class="title">Revisar y confirmar</h1>
    <p class="intro">
      Este es el último paso antes de cerrar el pedido. Revisa tus datos,
      el resumen de compra y el método de pago antes de confirmar.
    </p>

    <!-- Contenedor dinámico -->
    <div id="checkoutContent"></div>
  </main>

  <script>
    /* =========================================================
       CLAVES DE ALMACENAMIENTO
       ========================================================= */
    const CART_KEY = "bebeb-drinks-cart";
    const CHECKOUT_DATA_KEY = "bebeb-drinks-checkout-data";
    const ORDER_CONFIRMED_KEY = "bebeb-drinks-order-confirmed";

    /* =========================================================
       OBTENER EL CARRITO DESDE LOCALSTORAGE
       ========================================================= */
    function getCart() {
      const savedCart = localStorage.getItem(CART_KEY);
      return savedCart ? JSON.parse(savedCart) : [];
    }

    /* =========================================================
       OBTENER LOS DATOS DEL CLIENTE DESDE LOCALSTORAGE
       ========================================================= */
    function getSavedCheckoutData() {
      const savedData = localStorage.getItem(CHECKOUT_DATA_KEY);
      return savedData ? JSON.parse(savedData) : {};
    }

    /* =========================================================
       FORMATEAR PRECIOS
       ========================================================= */
    function formatPrice(price) {
      return "€" + price.toFixed(2);
    }

    /* =========================================================
       CALCULAR TOTALES DEL CARRITO
       ========================================================= */
    function getCartTotals(cart) {
      const totalUnits = cart.reduce((sum, item) => sum + item.quantity, 0);
      const totalPrice = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

      return {
        totalUnits,
        totalPrice
      };
    }

    /* =========================================================
       MOSTRAR ESTADO VACÍO
       - Se usa si faltan productos o datos del cliente
       ========================================================= */
    function renderEmptyCheckout(message, linkHref, linkText) {
      const checkoutContent = document.getElementById("checkoutContent");

      checkoutContent.innerHTML = `
        <section class="empty-box">
          <h2>No se puede continuar</h2>
          <p>${message}</p>
          <div class="empty-actions">
            <a href="${linkHref}" class="empty-link">${linkText}</a>
          </div>
        </section>
      `;
    }

    /* =========================================================
       RENDERIZAR EL CHECKOUT 3
       - Revisa productos
       - Revisa datos del cliente
       - Muestra pago visual
       - Añade acciones de atrás, confirmar y cancelar
       ========================================================= */
    function renderCheckoutStepThree() {
      const cart = getCart();
      const savedData = getSavedCheckoutData();
      const checkoutContent = document.getElementById("checkoutContent");

      /* Si no hay productos, bloqueamos el paso */
      if (cart.length === 0) {
        renderEmptyCheckout(
          "Tu carrito está vacío. Antes de confirmar un pedido, necesitas añadir productos.",
          "productos.html",
          "Ver productos"
        );
        return;
      }

      /* Si faltan datos esenciales, pedimos volver al paso 2 */
      if (!savedData.nombre || !savedData.email || !savedData.direccion) {
        renderEmptyCheckout(
          "Faltan datos del cliente. Vuelve al paso anterior para completar la información de entrega.",
          "checkout-2.html",
          "Ir al paso 2"
        );
        return;
      }

      const { totalUnits, totalPrice } = getCartTotals(cart);

      /* Resumen lateral de productos */
      const summaryItemsHTML = cart.map(item => `
        <div class="summary-item">
          <span><strong>${item.name}</strong> × ${item.quantity}</span>
          <span>${formatPrice(item.price * item.quantity)}</span>
        </div>
      `).join("");

      /* Resumen principal del pedido */
      const checkoutItemsHTML = cart.map(item => `
        <div class="review-row">
          <span class="review-label">${item.name}</span>
          <span class="review-value">
            ${item.quantity} unidad(es) · ${formatPrice(item.price * item.quantity)}
          </span>
        </div>
      `).join("");

      checkoutContent.innerHTML = `
        <div class="checkout-layout">
          <section class="panel">
            <div class="review-section">
              <h2>Datos del pedido</h2>
              <p>
                Revisa toda la información antes de confirmar la compra.
                Después pasaremos a la pantalla final de confirmación.
              </p>

              <div class="review-grid">
                ${checkoutItemsHTML}
              </div>
            </div>

            <div class="review-section">
              <h3 class="box-title">Datos de entrega</h3>

              <div class="review-grid">
                <div class="review-row">
                  <span class="review-label">Cliente</span>
                  <span class="review-value">${savedData.nombre} ${savedData.apellidos || ""}</span>
                </div>

                <div class="review-row">
                  <span class="review-label">Correo</span>
                  <span class="review-value">${savedData.email}</span>
                </div>

                <div class="review-row">
                  <span class="review-label">Teléfono</span>
                  <span class="review-value">${savedData.telefono || "-"}</span>
                </div>

                <div class="review-row">
                  <span class="review-label">Dirección</span>
                  <span class="review-value">
                    ${savedData.direccion}<br>
                    ${savedData.ciudad || ""} ${savedData.codigoPostal || ""}
                  </span>
                </div>

                <div class="review-row">
                  <span class="review-label">Notas</span>
                  <span class="review-value">${savedData.notas ? savedData.notas : "Sin indicaciones adicionales"}</span>
                </div>
              </div>
            </div>

            <div class="review-section">
              <h3 class="box-title">Pago</h3>
              <p>
                Esta versión muestra un checkout visual estático. Más adelante podrás decidir
                si quieres integrar pago real, transferencia, contacto directo o confirmación manual.
              </p>

              <div class="payment-box">
                <div class="payment-method">
                  <span class="payment-name">Tarjeta bancaria</span>
                  <span class="payment-badge">Disponible</span>
                </div>

                <div class="payment-method">
                  <span class="payment-name">Transferencia bancaria</span>
                  <span class="payment-badge">Próximamente</span>
                </div>

                <div class="payment-method">
                  <span class="payment-name">Confirmación manual</span>
                  <span class="payment-badge">Visual</span>
                </div>
              </div>

              <div class="trust-box">
                <p class="trust-title">Señales de confianza</p>
                <div class="trust-list">
                  <p>Resumen claro de productos, cantidades y total.</p>
                  <p>Posibilidad de volver atrás y corregir datos.</p>
                  <p>Última revisión antes de confirmar el pedido.</p>
                </div>
              </div>
            </div>

            <!-- =========================================
                 ACCIONES PRINCIPALES DEL PASO 3
                 - Volver atrás
                 - Confirmar pedido
                 ========================================= -->
            <div class="review-actions">
              <a href="checkout-2.html" class="secondary-btn">Volver a tus datos</a>
              <button id="confirmOrderBtn" class="primary-btn">Confirmar pedido</button>
            </div>

            <!-- =========================================
                 ACCIÓN SECUNDARIA PEQUEÑA
                 - Cancelar compra y salir del checkout
                 ========================================= -->
            <div class="review-cancel">
              <a href="carrito.html" class="cancel-link">Cancelar compra</a>
            </div>
          </section>

          <aside class="summary-box">
            <h2>Resumen final</h2>

            <div class="summary-lines">
              <div class="summary-line">
                <span>Productos distintos</span>
                <span>${cart.length}</span>
              </div>

              <div class="summary-line">
                <span>Unidades totales</span>
                <span>${totalUnits}</span>
              </div>

              <div class="summary-total">
                <span>Total</span>
                <span>${formatPrice(totalPrice)}</span>
              </div>
            </div>

            <div class="summary-items">
              ${summaryItemsHTML}
            </div>

            <p class="summary-note">
              Al confirmar, pasarás a la pantalla final del pedido.
            </p>
          </aside>
        </div>
      `;

      /* =========================================================
         BOTÓN DE CONFIRMAR PEDIDO
         - Guarda una marca de confirmación
         - Lleva al paso 4
         ========================================================= */
      const confirmOrderBtn = document.getElementById("confirmOrderBtn");

      confirmOrderBtn.addEventListener("click", function () {
        localStorage.setItem(ORDER_CONFIRMED_KEY, "true");
        window.location.href = "checkout-4.html";
      });
    }

    /* =========================================================
       INICIO DE LA PÁGINA
       ========================================================= */
    renderCheckoutStepThree();
  </script>
</body>
</html>
