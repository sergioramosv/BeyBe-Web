<!DOCTYPE html>
<html lang="es">
<head>
  <!-- =========================================================
       CONFIGURACIÓN BÁSICA DEL DOCUMENTO
       ========================================================= -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título de la página -->
  <title>Checkout 2 | Be&Be Drinks Spain</title>

  <!-- =========================================================
       TIPOGRAFÍAS PRINCIPALES DE LA WEB
       ========================================================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* =========================================================
       VARIABLES GLOBALES
       ========================================================= */
    :root {
      --bg: #f7f3ec;
      --surface: #fbf8f3;
      --surface-soft: #f2ede4;
      --line: #e7dfd2;
      --text: #1e1916;
      --muted: #807467;
      --soft: #aa9a88;
      --accent: #c7a27d;
      --dark: #111111;
      --success: #2f5a31;
      --error: #9f4d45;
    }

    /* =========================================================
       RESET BÁSICO
       ========================================================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    /* =========================================================
       CABECERA DE CHECKOUT
       ========================================================= */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(251, 248, 243, 0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 24px;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .topbar-link {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    /* =========================================================
       FLUJO VISUAL DE PASOS
       - Paso 1 completado
       - Paso 2 activo
       ========================================================= */
    .checkout-steps-wrap {
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .checkout-steps {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 22px 0;
      display: grid;
      grid-template-columns: 1fr 60px 1fr 60px 1fr 60px 1fr;
      align-items: center;
      gap: 0;
    }

    .checkout-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }

    .checkout-step-circle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.25s ease;
    }

    .checkout-step-label {
      font-size: 12px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .checkout-step-line {
      height: 1px;
      background: var(--line);
      width: 100%;
    }

    .checkout-step.is-active .checkout-step-circle {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .checkout-step.is-active .checkout-step-label {
      color: var(--text);
      font-weight: 600;
    }

    .checkout-step.is-completed .checkout-step-circle {
      background: var(--dark);
      border-color: var(--dark);
      color: white;
    }

    .checkout-step.is-completed .checkout-step-label {
      color: var(--text);
    }

    .checkout-step-line.is-completed {
      background: var(--accent);
    }

    /* =========================================================
       CONTENIDO PRINCIPAL
       ========================================================= */
    .page {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 56px 0 80px;
    }

    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 12px;
      margin-bottom: 16px;
    }

    .title {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(46px, 7vw, 78px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 500;
      margin-bottom: 18px;
    }

    .intro {
      max-width: 760px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
      margin-bottom: 34px;
    }

    .checkout-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(280px, 0.85fr);
      gap: 28px;
      align-items: start;
    }

    .panel,
    .summary-box,
    .empty-box {
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 32px;
    }

    .panel h2,
    .summary-box h2,
    .empty-box h2 {
      font-family: "Cormorant Garamond", serif;
      font-size: 34px;
      font-weight: 500;
      margin-bottom: 14px;
    }

    .panel p,
    .summary-box p,
    .empty-box p {
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
    }

    /* =========================================================
       FORMULARIO DE DATOS
       - Solo campos esenciales para no hacer el paso pesado
       ========================================================= */
    .checkout-form {
      margin-top: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--soft);
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: #d2b391;
      background: #fffdfa;
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .field-note {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* =========================================================
       MENSAJE DE ERROR DE VALIDACIÓN
       ========================================================= */
    .form-error {
      display: none;
      margin-top: 18px;
      padding: 14px 16px;
      background: #fbefec;
      border: 1px solid #ebd0c9;
      color: var(--error);
      font-size: 14px;
      line-height: 1.6;
    }

    .form-error.is-visible {
      display: block;
    }

    /* =========================================================
       BOTONES DE ACCIÓN DEL FORMULARIO
       ========================================================= */
    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .primary-btn,
    .secondary-btn {
      border: none;
      padding: 15px 18px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .primary-btn {
      background: var(--dark);
      color: white;
    }

    .secondary-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }

    /* =========================================================
       RESUMEN DEL PEDIDO
       ========================================================= */
    .summary-lines {
      display: grid;
      gap: 14px;
      margin: 18px 0 24px;
    }

    .summary-line,
    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .summary-line {
      color: var(--muted);
      font-size: 15px;
    }

    .summary-total {
      border-top: 1px solid var(--line);
      padding-top: 18px;
      font-size: 19px;
      font-weight: 600;
    }

    .summary-items {
      display: grid;
      gap: 12px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      font-size: 14px;
      color: var(--muted);
    }

    .summary-item strong {
      color: var(--text);
      font-weight: 600;
    }

    .summary-note {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      margin-top: 20px;
    }

    /* =========================================================
       ESTADO VACÍO
       ========================================================= */
    .empty-actions {
      margin-top: 22px;
    }

    .empty-link {
      display: inline-block;
      background: var(--dark);
      color: white;
      padding: 15px 18px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
    }

    /* =========================================================
       RESPONSIVE
       ========================================================= */
    @media (max-width: 900px) {
      .checkout-layout,
      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .topbar-inner,
      .checkout-steps,
      .page {
        width: calc(100% - 24px);
      }

      .topbar-inner {
        min-height: auto;
        padding: 18px 0;
      }

      .checkout-steps {
        grid-template-columns: 1fr;
        gap: 14px;
        padding: 18px 0 20px;
      }

      .checkout-step {
        flex-direction: row;
        justify-content: flex-start;
        text-align: left;
        gap: 14px;
      }

      .checkout-step-line {
        height: 18px;
        width: 1px;
        margin: 0 auto;
      }

      .page {
        padding: 40px 0 56px;
      }

      .panel,
      .summary-box,
      .empty-box {
        padding: 20px;
      }

      .panel h2,
      .summary-box h2,
      .empty-box h2 {
        font-size: 28px;
      }

      .form-actions {
        display: grid;
        grid-template-columns: 1fr;
      }

      .primary-btn,
      .secondary-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- =========================================================
       CABECERA DEL CHECKOUT
       ========================================================= -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand-name">Be&Be Drinks Spain</div>
      <a href="checkout-1.html" class="topbar-link">Volver al paso anterior</a>
    </div>
  </header>

  <!-- =========================================================
       FLUJO VISUAL DE PASOS
       - Paso 1 completado
       - Paso 2 activo
       ========================================================= -->
  <section class="checkout-steps-wrap">
    <div class="checkout-steps">
      <div class="checkout-step is-completed">
        <div class="checkout-step-circle">1</div>
        <p class="checkout-step-label">Confirmación</p>
      </div>

      <div class="checkout-step-line is-completed"></div>

      <div class="checkout-step is-active">
        <div class="checkout-step-circle">2</div>
        <p class="checkout-step-label">Datos</p>
      </div>

      <div class="checkout-step-line"></div>

      <div class="checkout-step">
        <div class="checkout-step-circle">3</div>
        <p class="checkout-step-label">Pago</p>
      </div>

      <div class="checkout-step-line"></div>

      <div class="checkout-step">
        <div class="checkout-step-circle">4</div>
        <p class="checkout-step-label">Confirmación final</p>
      </div>
    </div>
  </section>

  <!-- =========================================================
       CONTENIDO PRINCIPAL
       ========================================================= -->
  <main class="page">
    <p class="eyebrow">Checkout</p>
    <h1 class="title">Tus datos</h1>
    <p class="intro">
      Completa la información necesaria para preparar el pedido.
      Hemos dejado solo los campos esenciales para que el proceso sea más claro y ligero.
    </p>

    <!-- Contenedor dinámico del contenido -->
    <div id="checkoutContent"></div>
  </main>

  <script>
    /* =========================================================
       CLAVES DE ALMACENAMIENTO
       - CART_KEY guarda el carrito
       - CHECKOUT_DATA_KEY guarda los datos del cliente
       ========================================================= */
    const CART_KEY = "bebeb-drinks-cart";
    const CHECKOUT_DATA_KEY = "bebeb-drinks-checkout-data";

    /* =========================================================
       OBTENER EL CARRITO DESDE LOCALSTORAGE
       ========================================================= */
    function getCart() {
      const savedCart = localStorage.getItem(CART_KEY);
      return savedCart ? JSON.parse(savedCart) : [];
    }

    /* =========================================================
       OBTENER DATOS DE CHECKOUT GUARDADOS
       - Sirve para recuperar campos si el usuario vuelve atrás
       ========================================================= */
    function getSavedCheckoutData() {
      const savedData = localStorage.getItem(CHECKOUT_DATA_KEY);
      return savedData ? JSON.parse(savedData) : {};
    }

    /* =========================================================
       GUARDAR LOS DATOS DEL FORMULARIO
       ========================================================= */
    function saveCheckoutData(data) {
      localStorage.setItem(CHECKOUT_DATA_KEY, JSON.stringify(data));
    }

    /* =========================================================
       FORMATEAR PRECIOS
       ========================================================= */
    function formatPrice(price) {
      return "€" + price.toFixed(2);
    }

    /* =========================================================
       CALCULAR TOTALES DEL CARRITO
       ========================================================= */
    function getCartTotals(cart) {
      const totalUnits = cart.reduce((sum, item) => sum + item.quantity, 0);
      const totalPrice = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

      return {
        totalUnits,
        totalPrice
      };
    }

    /* =========================================================
       MOSTRAR ESTADO VACÍO
       - Si no hay carrito, no permitimos entrar al paso 2
       ========================================================= */
    function renderEmptyCheckout() {
      const checkoutContent = document.getElementById("checkoutContent");

      checkoutContent.innerHTML = `
        <section class="empty-box">
          <h2>No hay productos en tu pedido</h2>
          <p>
            Tu carrito está vacío en este momento. Antes de rellenar tus datos,
            necesitas añadir al menos una bebida al pedido.
          </p>
          <div class="empty-actions">
            <a href="productos.html" class="empty-link">Ver productos</a>
          </div>
        </section>
      `;
    }

    /* =========================================================
       VALIDAR EL FORMULARIO
       - Revisa solo campos esenciales
       - Devuelve true si todo es correcto
       ========================================================= */
    function validateCheckoutForm(data) {
      return (
        data.nombre.trim() !== "" &&
        data.apellidos.trim() !== "" &&
        data.email.trim() !== "" &&
        data.telefono.trim() !== "" &&
        data.direccion.trim() !== "" &&
        data.ciudad.trim() !== "" &&
        data.codigoPostal.trim() !== ""
      );
    }

    /* =========================================================
       RENDERIZAR EL PASO 2 DEL CHECKOUT
       - Formulario de datos
       - Resumen lateral
       - Guardado previo antes de pasar al checkout 3
       ========================================================= */
    function renderCheckoutStepTwo() {
      const cart = getCart();
      const checkoutContent = document.getElementById("checkoutContent");

      if (cart.length === 0) {
        renderEmptyCheckout();
        return;
      }

      const savedData = getSavedCheckoutData();
      const { totalUnits, totalPrice } = getCartTotals(cart);

      const summaryItemsHTML = cart.map(item => `
        <div class="summary-item">
          <span><strong>${item.name}</strong> × ${item.quantity}</span>
          <span>${formatPrice(item.price * item.quantity)}</span>
        </div>
      `).join("");

      checkoutContent.innerHTML = `
        <div class="checkout-layout">
          <section class="panel">
            <h2>Información de entrega</h2>
            <p>
              Introduce los datos básicos para continuar con el pedido.
              En el siguiente paso revisaremos el checkout final.
            </p>

            <form id="checkoutForm" class="checkout-form">
              <div class="form-grid">
                <div class="field">
                  <label for="nombre">Nombre</label>
                  <input
                    type="text"
                    id="nombre"
                    name="nombre"
                    placeholder="Tu nombre"
                    value="${savedData.nombre || ""}"
                  >
                </div>

                <div class="field">
                  <label for="apellidos">Apellidos</label>
                  <input
                    type="text"
                    id="apellidos"
                    name="apellidos"
                    placeholder="Tus apellidos"
                    value="${savedData.apellidos || ""}"
                  >
                </div>

                <div class="field">
                  <label for="email">Correo electrónico</label>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="ejemplo@email.com"
                    value="${savedData.email || ""}"
                  >
                </div>

                <div class="field">
                  <label for="telefono">Teléfono</label>
                  <input
                    type="tel"
                    id="telefono"
                    name="telefono"
                    placeholder="+34 600 000 000"
                    value="${savedData.telefono || ""}"
                  >
                </div>

                <div class="field full">
                  <label for="direccion">Dirección</label>
                  <input
                    type="text"
                    id="direccion"
                    name="direccion"
                    placeholder="Calle, número, piso..."
                    value="${savedData.direccion || ""}"
                  >
                </div>

                <div class="field">
                  <label for="ciudad">Ciudad</label>
                  <input
                    type="text"
                    id="ciudad"
                    name="ciudad"
                    placeholder="Ciudad"
                    value="${savedData.ciudad || ""}"
                  >
                </div>

                <div class="field">
                  <label for="codigoPostal">Código postal</label>
                  <input
                    type="text"
                    id="codigoPostal"
                    name="codigoPostal"
                    placeholder="28000"
                    value="${savedData.codigoPostal || ""}"
                  >
                </div>

                <div class="field full">
                  <label for="notas">Notas del pedido (opcional)</label>
                  <textarea
                    id="notas"
                    name="notas"
                    placeholder="Añade aquí cualquier indicación extra para el pedido..."
                  >${savedData.notas || ""}</textarea>
                  <p class="field-note">
                    Este campo es opcional. Úsalo solo si necesitas añadir una observación.
                  </p>
                </div>
              </div>

              <div id="formError" class="form-error">
                Por favor, completa todos los campos obligatorios antes de continuar.
              </div>

              <div class="form-actions">
                <a href="checkout-1.html" class="secondary-btn">Volver al paso 1</a>
                <button type="submit" class="primary-btn">Continuar al pago</button>
              </div>
            </form>
          </section>

          <aside class="summary-box">
            <h2>Resumen</h2>

            <div class="summary-lines">
              <div class="summary-line">
                <span>Productos distintos</span>
                <span>${cart.length}</span>
              </div>

              <div class="summary-line">
                <span>Unidades totales</span>
                <span>${totalUnits}</span>
              </div>

              <div class="summary-total">
                <span>Total</span>
                <span>${formatPrice(totalPrice)}</span>
              </div>
            </div>

            <div class="summary-items">
              ${summaryItemsHTML}
            </div>

            <p class="summary-note">
              Tus datos se guardan en este navegador para que no los pierdas si retrocedes dentro del proceso.
            </p>
          </aside>
        </div>
      `;

      /* =========================================================
         CONTROL DEL FORMULARIO
         - Recoge los datos
         - Valida campos esenciales
         - Guarda la información
         - Avanza al paso 3 si todo es correcto
         ========================================================= */
      const checkoutForm = document.getElementById("checkoutForm");
      const formError = document.getElementById("formError");

      checkoutForm.addEventListener("submit", function (event) {
        event.preventDefault();

        const formData = {
          nombre: document.getElementById("nombre").value,
          apellidos: document.getElementById("apellidos").value,
          email: document.getElementById("email").value,
          telefono: document.getElementById("telefono").value,
          direccion: document.getElementById("direccion").value,
          ciudad: document.getElementById("ciudad").value,
          codigoPostal: document.getElementById("codigoPostal").value,
          notas: document.getElementById("notas").value
        };

        if (!validateCheckoutForm(formData)) {
          formError.classList.add("is-visible");
          return;
        }

        formError.classList.remove("is-visible");
        saveCheckoutData(formData);

        /* Avanzamos al siguiente paso del checkout */
        window.location.href = "checkout-3.html";
      });
    }

    /* =========================================================
       INICIO DE LA PÁGINA
       ========================================================= */
    renderCheckoutStepTwo();
  </script>
</body>
</html>
