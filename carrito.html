<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito | Be&Be Drinks Spain</title>

  <!-- Tipografías principales de la web -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ==============================
       VARIABLES GLOBALES DE COLOR
       ============================== */
    :root {
      --bg: #f7f3ec;
      --surface: #fbf8f3;
      --surface-soft: #f2ede4;
      --line: #e7dfd2;
      --text: #1e1916;
      --muted: #807467;
      --soft: #aa9a88;
      --accent: #c7a27d;
      --dark: #111111;
      --success: #2f5a31;
    }

    /* ==============================
       RESET BÁSICO
       ============================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    button,
    input {
      font: inherit;
    }

    /* ==============================
       CABECERA
       ============================== */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(251, 248, 243, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      min-height: 86px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 24px;
      line-height: 1;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }

    .nav {
      display: flex;
      gap: 38px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
      align-items: center;
    }

    .cart-link {
      min-width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--accent);
      background: var(--surface-soft);
      padding: 0 10px;
    }

    .cart-link svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    .cart-count {
      min-width: 20px;
      height: 20px;
      border-radius: 999px;
      background: var(--dark);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      line-height: 1;
      padding: 0 6px;
    }

    /* ==============================
       CONTENIDO PRINCIPAL
       ============================== */
    .page {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 64px 0 80px;
    }

    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 12px;
      margin-bottom: 16px;
    }

    .title {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(48px, 7vw, 80px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 500;
      margin-bottom: 22px;
    }

    .intro {
      max-width: 700px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
      margin-bottom: 32px;
    }

    .cart-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.9fr);
      gap: 28px;
      align-items: start;
    }

    .cart-box,
    .summary-box {
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 32px;
    }

    .cart-box h2,
    .summary-box h2,
    .empty-box h2 {
      font-family: "Cormorant Garamond", serif;
      font-size: 34px;
      font-weight: 500;
      margin-bottom: 14px;
    }

    .cart-box p,
    .summary-box p,
    .empty-box p {
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
    }

    /* ==============================
       LISTADO DE PRODUCTOS
       ============================== */
    .cart-items {
      display: grid;
      gap: 18px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 96px 1fr auto;
      gap: 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
      align-items: start;
    }

    .cart-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .cart-item-image {
      width: 96px;
      height: 96px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      padding: 10px;
    }

    .cart-item-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .cart-item-name {
      font-size: 20px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .cart-item-meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 6px;
    }

    .cart-item-unit {
      color: var(--soft);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .item-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .quantity-selector {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      background: white;
    }

    .quantity-selector button {
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 20px;
      color: var(--text);
    }

    .quantity-selector input {
      width: 52px;
      height: 40px;
      border: none;
      text-align: center;
      background: transparent;
      outline: none;
      font-size: 15px;
    }

    .remove-btn {
      border: 1px solid var(--line);
      background: transparent;
      padding: 10px 14px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 11px;
      color: var(--muted);
    }

    .item-total {
      font-size: 18px;
      font-weight: 600;
      white-space: nowrap;
    }

    /* ==============================
       RESUMEN DE COMPRA
       ============================== */
    .summary-lines {
      display: grid;
      gap: 14px;
      margin: 18px 0 24px;
    }

    .summary-line,
    .summary-total {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }

    .summary-line {
      color: var(--muted);
      font-size: 15px;
    }

    .summary-total {
      border-top: 1px solid var(--line);
      padding-top: 18px;
      font-size: 19px;
      font-weight: 600;
    }

    .summary-note {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 22px;
    }

    .summary-actions {
      display: grid;
      gap: 12px;
    }

    .primary-btn,
    .secondary-btn {
      width: 100%;
      border: none;
      padding: 15px 18px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
    }

    .primary-btn {
      background: var(--dark);
      color: white;
    }

    .secondary-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }

    /* ==============================
       ESTADO VACÍO
       ============================== */
    .empty-box {
      max-width: 760px;
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 32px;
    }

    .empty-actions {
      margin-top: 22px;
    }

    .empty-link {
      display: inline-block;
      background: var(--dark);
      color: white;
      padding: 15px 18px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
    }

    /* ==============================
       MENSAJE DE ACTUALIZACIÓN
       ============================== */
    .cart-status {
      margin-top: 18px;
      color: var(--success);
      font-size: 14px;
      display: none;
    }

    .cart-status.show {
      display: block;
    }

    /* ==============================
       RESPONSIVE
       ============================== */
    @media (max-width: 900px) {
      .cart-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .topbar-inner,
      .page {
        width: calc(100% - 24px);
      }

      .topbar-inner {
        min-height: auto;
        padding: 18px 0;
        flex-wrap: wrap;
        align-items: center;
        gap: 16px;
      }

      .nav {
        gap: 18px;
        flex-wrap: wrap;
        margin-left: 0;
        order: 3;
        width: 100%;
      }

      .page {
        padding: 40px 0 56px;
      }

      .cart-box,
      .summary-box,
      .empty-box {
        padding: 20px;
      }

      .cart-box h2,
      .summary-box h2,
      .empty-box h2 {
        font-size: 28px;
      }

      .cart-item {
        grid-template-columns: 1fr;
      }

      .cart-item-image {
        width: 88px;
        height: 88px;
      }

      .item-total {
        margin-top: 6px;
      }
    }
  </style>
</head>
<body>
  <!-- Cabecera principal del carrito -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand-name">Be&Be Drinks Spain</div>

      <nav class="nav">
        <a href="index.html">Inicio</a>
        <a href="productos.html">Productos</a>
        <a href="historia.html">Historia</a>
        <a href="contacto.html">Contacto</a>
      </nav>

      <a href="carrito.html" class="cart-link" aria-label="Ver carrito">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="9" cy="19" r="1.5" fill="currentColor"></circle>
          <circle cx="17" cy="19" r="1.5" fill="currentColor"></circle>
          <path d="M3 5H5L7.2 14H17.4L20 8H6.3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
        <span id="cartCount" class="cart-count">0</span>
      </a>
    </div>
  </header>

  <!-- Contenido principal de la página -->
  <main class="page">
    <p class="eyebrow">Carrito</p>
    <h1 class="title">Tu selección</h1>
    <p class="intro">
      Revisa tus bebidas, ajusta cantidades y confirma el resumen antes de continuar con la siguiente fase de compra.
    </p>

    <!-- Aquí JavaScript insertará el carrito vacío o el carrito con productos -->
    <div id="cartContent"></div>
  </main>

  <script>
    /* =========================================================
       CLAVE DEL CARRITO EN LOCALSTORAGE
       ---------------------------------------------------------
       Esta constante define el nombre con el que guardamos
       el carrito en el navegador.
    ========================================================= */
    const CART_KEY = "bebeb-drinks-cart";

    /* =========================================================
       OBTENER EL CARRITO GUARDADO
       ---------------------------------------------------------
       - Si existe información en localStorage, la convertimos
         desde texto JSON a array real.
       - Si no existe nada, devolvemos un array vacío.
    ========================================================= */
    function getCart() {
      const savedCart = localStorage.getItem(CART_KEY);
      return savedCart ? JSON.parse(savedCart) : [];
    }

    /* =========================================================
       GUARDAR EL CARRITO
       ---------------------------------------------------------
       Convierte el array del carrito en texto JSON y lo guarda
       en localStorage para conservarlo entre páginas.
    ========================================================= */
    function saveCart(cart) {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
    }

    /* =========================================================
       FORMATEAR PRECIOS
       ---------------------------------------------------------
       Recibe un número y devuelve un texto con formato euro.
       Ejemplo: 3.3 -> €3.30
    ========================================================= */
    function formatPrice(price) {
      return "€" + price.toFixed(2);
    }

    /* =========================================================
       ACTUALIZAR CONTADOR DEL ICONO DEL CARRITO
       ---------------------------------------------------------
       Muestra cuántos productos distintos hay actualmente
       guardados en el carrito.
    ========================================================= */
    function updateCartCount() {
      const cart = getCart();
      const distinctProducts = cart.length;
      const cartCount = document.getElementById("cartCount");

      if (cartCount) {
        cartCount.textContent = distinctProducts;
      }
    }

    /* =========================================================
       CALCULAR TOTALES DEL CARRITO
       ---------------------------------------------------------
       Devuelve:
       - totalUnits: suma de todas las cantidades
       - totalPrice: suma del precio total del carrito
    ========================================================= */
    function getCartTotals(cart) {
      const totalUnits = cart.reduce((sum, item) => sum + item.quantity, 0);
      const totalPrice = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

      return {
        totalUnits,
        totalPrice
      };
    }

    /* =========================================================
       CAMBIAR CANTIDAD DE UN PRODUCTO
       ---------------------------------------------------------
       - Busca el producto por su id.
       - Suma o resta la cantidad.
       - Si llega a 0 o menos, elimina el producto.
       - Después vuelve a pintar el carrito.
    ========================================================= */
    function changeItemQuantity(productId, amount) {
      const cart = getCart();
      const product = cart.find(item => item.id === productId);

      if (!product) return;

      product.quantity += amount;

      if (product.quantity <= 0) {
        const updatedCart = cart.filter(item => item.id !== productId);
        saveCart(updatedCart);
      } else {
        saveCart(cart);
      }

      renderCart();
    }

    /* =========================================================
       ELIMINAR UN PRODUCTO COMPLETO
       ---------------------------------------------------------
       Borra por completo una línea del carrito usando su id.
    ========================================================= */
    function removeItem(productId) {
      const cart = getCart();
      const updatedCart = cart.filter(item => item.id !== productId);
      saveCart(updatedCart);
      renderCart();
    }

    /* =========================================================
       VACIAR TODO EL CARRITO
       ---------------------------------------------------------
       Elimina la clave del carrito de localStorage y vuelve
       a mostrar el estado vacío.
    ========================================================= */
    function clearCart() {
      localStorage.removeItem(CART_KEY);
      renderCart();
    }

    /* =========================================================
       MOSTRAR CARRITO VACÍO
       ---------------------------------------------------------
       Inserta el bloque HTML del estado vacío cuando no hay
       productos añadidos.
    ========================================================= */
    function renderEmptyCart() {
      const cartContent = document.getElementById("cartContent");

      cartContent.innerHTML = `
        <section class="empty-box">
          <h2>Tu carrito está vacío</h2>
          <p>
            Aún no hay productos añadidos. Cuando selecciones bebidas desde la página de productos,
            aparecerán aquí con sus cantidades y su importe correspondiente.
          </p>
          <div class="empty-actions">
            <a href="productos.html" class="empty-link">Ver productos</a>
          </div>
        </section>
      `;
    }

    /* =========================================================
       PINTAR TODO EL CARRITO
       ---------------------------------------------------------
       Esta es la función principal:
       - Lee el carrito actual.
       - Actualiza el contador superior.
       - Si no hay productos, muestra el estado vacío.
       - Si hay productos, construye el HTML completo:
         listado de productos + resumen lateral.
    ========================================================= */
    function renderCart() {
      const cart = getCart();
      const cartContent = document.getElementById("cartContent");

      updateCartCount();

      if (cart.length === 0) {
        renderEmptyCart();
        return;
      }

      const { totalUnits, totalPrice } = getCartTotals(cart);

      /* ---------------------------------------------------------
         Creamos el HTML de cada producto del carrito.
         Aquí mostramos:
         - imagen
         - nombre
         - precio unitario
         - texto "3.30 por lata" si el producto vale 3.30
         - selector de cantidad
         - botón eliminar
         - total de esa línea
      --------------------------------------------------------- */
      const cartItemsHTML = cart.map(item => `
        <article class="cart-item">
          <div class="cart-item-image">
            <img src="${item.image}" alt="${item.name}">
          </div>

          <div>
            <h3 class="cart-item-name">${item.name}</h3>
            <p class="cart-item-meta">Precio unitario: ${formatPrice(item.price)}</p>
            <p class="cart-item-unit">Precio por lata</p>

            <div class="item-controls">
              <div class="quantity-selector">
                <button type="button" onclick="changeItemQuantity('${item.id}', -1)">−</button>
                <input type="number" value="${item.quantity}" min="1" readonly>
                <button type="button" onclick="changeItemQuantity('${item.id}', 1)">+</button>
              </div>

              <button class="remove-btn" type="button" onclick="removeItem('${item.id}')">
                Eliminar
              </button>
            </div>
          </div>

          <div class="item-total">
            ${formatPrice(item.price * item.quantity)}
          </div>
        </article>
      `).join("");

      /* ---------------------------------------------------------
         Insertamos la estructura completa del carrito.
         Lado izquierdo:
         - productos añadidos
         Lado derecho:
         - resumen numérico
         - botón seguir comprando
         - botón vaciar carrito
      --------------------------------------------------------- */
      cartContent.innerHTML = `
        <div class="cart-layout">
          <section class="cart-box">
            <h2>Productos añadidos</h2>
            <div class="cart-items">
              ${cartItemsHTML}
            </div>
          </section>

          <aside class="summary-box">
            <h2>Resumen</h2>

            <div class="summary-lines">
              <div class="summary-line">
                <span>Productos distintos</span>
                <span>${cart.length}</span>
              </div>

              <div class="summary-line">
                <span>Unidades totales</span>
                <span>${totalUnits}</span>
              </div>

              <div class="summary-line">
                <span>Precio por lata</span>
                <span>€3.30</span>
              </div>

              <div class="summary-total">
                <span>Total</span>
                <span>${formatPrice(totalPrice)}</span>
              </div>
            </div>

            <p class="summary-note">
              Todos los productos activos están configurados actualmente a €3.30 por lata.
              Puedes ajustar cantidades antes de pasar a la siguiente fase de compra.
            </p>

            <div class="summary-actions">
              <a href="productos.html" class="secondary-btn" style="display:inline-flex;align-items:center;justify-content:center;">
                Seguir comprando
              </a>
              <button class="primary-btn" type="button" onclick="clearCart()">
                Vaciar carrito
              </button>
            </div>
          </aside>
        </div>
      `;
    }

    /* =========================================================
       ARRANQUE INICIAL
       ---------------------------------------------------------
       Al cargar la página, dibujamos el carrito una vez para
       mostrar el estado correcto desde el principio.
    ========================================================= */
    renderCart();
  </script>
</body>
</html>
